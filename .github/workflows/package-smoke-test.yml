name: Package Smoke Test

on:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pyyaml

      - name: Rebuild indexes and validate
        run: python scripts/validate_release.py --skip-upstream

      - name: Build ZIP artifact
        run: |
          python - <<'PY'
          from pathlib import Path
          import zipfile
          root = Path.cwd()
          out = root / 'agent-skills-vvip-pro-max-ultra.zip'
          excluded = {'.git'}
          with zipfile.ZipFile(out, 'w', compression=zipfile.ZIP_DEFLATED, compresslevel=9) as z:
              for path in root.rglob('*'):
                  if path == out or any(part in excluded for part in path.parts):
                      continue
                  if path.is_file():
                      z.write(path, path.relative_to(root.parent))
          print(out)
          PY
